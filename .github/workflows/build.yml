name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate source
        shell: powershell
        run: .\scripts\Test-Source.ps1

      - name: Build installer
        shell: powershell
        run: .\scripts\Build-Installer.ps1

      - name: Record artifact digest
        shell: powershell
        run: Get-FileHash .\artifacts\JBBToken-Codex-Setup-v1.1.34-dropdown-panel-win64.exe -Algorithm SHA256 | Format-List

      - name: Upload unsigned installer
        uses: actions/upload-artifact@v4
        with:
          name: jbbtoken-codex-launcher-unsigned
          path: artifacts/JBBToken-Codex-Setup-v1.1.34-dropdown-panel-win64.exe
          if-no-files-found: error
          retention-days: 14
